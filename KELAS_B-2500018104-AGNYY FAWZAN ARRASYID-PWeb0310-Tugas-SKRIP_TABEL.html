<!DOCTYPE html>
<html>
<head>
<style>
    /* Styling agar tampilan garis terlihat ganda seperti di gambar */
    table, th, td {
        border: 1px solid black;
        border-collapse: separate;
        border-spacing: 2px;
        padding: 10px;
        text-align: center;
    }
    
    table {
        margin-top: 10px;
    }
</style>
</head>
<body>

    <p>Ini adalah tabel</p>

    <table>
        <tr>
            <th>kolom 1</th>
            <th>kolom 2</th>
        </tr>
        <tr>
            <td>baris 1 kolom 1</td>
            <td>baris 1 kolom 2</td>
        </tr>
        <tr>
            <td>baris 2 kolom 1</td>
            <td>baris 2 kolom 2</td>
        </tr>
    </table>

</body>
</html>
